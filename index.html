<!DOCTYPE html>

<html>
<head>
  <title>Urban Accessibility Dashboard</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
      margin: 0;
      padding: 10px;
    }

    h2 { margin: 10px 0; }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }

    input, select, button {
      padding: 8px;
      font-size: 14px;
      border-radius: 6px;
    }

    .chart-container {
      width: 100%;
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    canvas {
      width: 100% !important;
      height: auto !important;
      max-height: 500px;
    }

    .gap-box {
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      font-weight: bold;
    }

    .high { background: #ffcccc; color: #a10000; }
    .medium { background: #fff3cd; color: #8a6d3b; }
    .low { background: #d4edda; color: #155724; }

    .ranking {
      width: 100%;
      max-width: 900px;
      margin: 20px auto;
      background: white;
      padding: 15px;
      border-radius: 10px;
      text-align: left;
    }
  </style>

</head>

<body>

<h2>Urban Infrastructure Accessibility</h2>

<div class="controls">
  <input type="text" id="searchBox" placeholder="Type GRID ID..." onkeyup="filterGrid()">
  <select id="gridSelect"></select>
  <button id="modeBtn" onclick="toggleMode()">Switch to Availability</button>
</div>

<div class="chart-container">
  <canvas id="radarChart"></canvas>
  <div id="gapBox" class="gap-box"></div>
</div>

<div class="ranking">
  <h3>Top 10 Underserved Grids</h3>
  <ol id="rankingList"></ol>
</div>

<script>
let chart;
let allData = [];
let maxValues = {};
let mode = "deficit";

Papa.parse("5buffer.csv", {
  download: true,
  header: true,
  complete: function(results) {

    allData = results.data.filter(d => d.GRID_ID);

    const safeMax = arr => {
      const m = Math.max(...arr);
      return (!isFinite(m) || m === 0) ? 1 : m;
    };

    maxValues = {
      road: safeMax(allData.map(d => parseFloat(d.sum_Road_l)||0)),
      transp: safeMax(allData.map(d => parseFloat(d.sum_Transp)||0)),
      school: safeMax(allData.map(d => parseFloat(d.School_Nos)||0)),
      health: safeMax(allData.map(d => parseFloat(d.sum_Health)||0))
    };

    const sel = document.getElementById("gridSelect");

    let optAll = document.createElement("option");
    optAll.value = "all";
    optAll.text = "All Grids";
    sel.appendChild(optAll);

    allData.forEach((row, i)=>{
      let opt = document.createElement("option");
      opt.value = i;
      opt.text = row.GRID_ID;
      sel.appendChild(opt);
    });

    sel.value = "all";

    generateRanking();
    updateChart("all");

    sel.addEventListener("change", function(){
      updateChart(this.value);
    });
  }
});

function normalize(v, max){
  if(!isFinite(v) || max===0) return 0;
  return v/max;
}

function logNorm(v, max){
  return normalize(Math.log(1+v), Math.log(1+max));
}

function toggleMode(){
  mode = (mode === "availability") ? "deficit" : "availability";
  document.getElementById("modeBtn").innerText =
    mode === "deficit" ? "Switch to Availability" : "Switch to Deficit";

  updateChart(document.getElementById("gridSelect").value);
}

function computeValues(row){
  return [
    logNorm(parseFloat(row.sum_Road_l||0), maxValues.road),
    normalize(parseFloat(row.sum_Transp||0), maxValues.transp),
    normalize(parseFloat(row.School_Nos||0), maxValues.school),
    normalize(parseFloat(row.sum_Health||0), maxValues.health)
  ];
}

function computeGap(values){
  const avg = values.reduce((a,b)=>a+b,0)/values.length;
  return 1 - avg;
}

function generateRanking(){
  let ranked = allData.map(row=>{
    const vals = computeValues(row);
    return {id: row.GRID_ID, gap: computeGap(vals)};
  });

  ranked.sort((a,b)=>b.gap - a.gap);

  const list = document.getElementById("rankingList");
  list.innerHTML = "";

  ranked.slice(0,10).forEach(r=>{
    let li = document.createElement("li");
    li.innerText = `${r.id} → Gap: ${r.gap.toFixed(2)}`;
    list.appendChild(li);
  });
}

function updateChart(index){

  let values;

  if(index==="all"){
    let sum = [0,0,0,0];
    allData.forEach(r=>{
      let v = computeValues(r);
      sum = sum.map((s,i)=>s+v[i]);
    });
    values = sum.map(v=>v/allData.length);
  } else {
    values = computeValues(allData[index]);
  }

  if(mode==="deficit"){
    values = values.map(v=>1-v);
  }

  const gap = computeGap(values);

  const box = document.getElementById("gapBox");
  let cls = gap>0.66?"high":gap>0.33?"medium":"low";
  let txt = gap>0.66?"High Gap (Underserved)":
            gap>0.33?"Moderate Gap":"Low Gap";

  box.className = "gap-box " + cls;
  box.innerHTML = `Accessibility Gap Index: ${gap.toFixed(2)} → ${txt}`;

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("radarChart"), {
    type:"radar",
    data:{
      labels:["Roads","Transport","Schools","Hospitals"],
      datasets:[{
        label: index==="all"?"All Grids":allData[index].GRID_ID,
        data: values,
        backgroundColor: mode==="deficit" ? "rgba(255,0,0,0.2)" : "rgba(0,123,255,0.2)",
        borderColor: mode==="deficit" ? "red" : "blue",
        borderWidth:2
      }]
    },
    options:{
      responsive:true,
      scales:{
        r:{
          beginAtZero:true,
          max:1
        }
      }
    }
  });
}

function filterGrid() {
  const input = document.getElementById("searchBox").value.toUpperCase();
  const select = document.getElementById("gridSelect");

  for (let i = 0; i < select.options.length; i++) {
    let txt = select.options[i].text.toUpperCase();
    select.options[i].style.display = txt.includes(input) ? "" : "none";
  }
}
</script>

</body>
</html>
